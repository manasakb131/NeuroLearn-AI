<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Signup</title>

<link rel="stylesheet"
href="css/auth.css">

</head>

<body>

<div class="auth-container">

<form id="signupForm"
class="auth-card">

<h1>Create Account</h1>

<input type="email"
id="signupEmail"
placeholder="Email"
required>

<div class="password-box">

<input type="password"
id="signupPassword"
placeholder="Password"
required>

<span id="toggleSignupPassword">
👁
</span>

</div>

<button type="submit">
Signup
</button>

<p>
Already have account?
<a href="login.html">
Login
</a>
</p>

</form>

</div>

<script type="module"
src="js/auth.js"></script>

</body>
</html>
