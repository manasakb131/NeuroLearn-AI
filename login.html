<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet"
href="css/auth.css">

</head>

<body>

<div class="auth-container">

<form id="loginForm"
class="auth-card">

<h1>Login</h1>

<input type="email"
id="loginEmail"
placeholder="Email"
required>

<div class="password-box">

<input type="password"
id="loginPassword"
placeholder="Password"
required>

<span id="toggleLoginPassword">
👁
</span>

</div>

<button type="submit">
Login
</button>

<p>
No account?
<a href="signup.html">
Signup
</a>
</p>

</form>

</div>

<script type="module"
src="js/auth.js"></script>

</body>
</html>
